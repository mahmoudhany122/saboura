name: saboura
description: "Saboura - A Modern Learning Management System Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8

  # Backend & Auth
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.2.1

  # Service Locator & Local Storage
  get_it: ^9.2.1
  shared_preferences: ^2.5.4

  # Networking
  dio: ^5.9.2
  dartz: ^0.10.1

  # UI & UX
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  lottie: ^3.3.2
  animate_do: ^4.2.0
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/animations/

  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
